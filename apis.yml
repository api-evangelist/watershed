apis:
- aid: watershed:platform-api
  name: Watershed Platform API
  description: 'The Watershed Platform API enables programmatic ingestion of activity
    data,

    retrieval of computed emissions footprints, and integration with reporting

    and decarbonization workflows. API keys are managed in the customer''s

    Watershed dashboard under Organization Settings. Public, self-service

    developer documentation is limited; detailed reference materials are made

    available to customers and integration partners during onboarding.

    '
  humanURL: https://watershed.com/
  tags:
  - Carbon Data
  - Emissions
  - Ingestion
  - Reporting
  - Footprints
  - Enterprise API
  properties:
  - type: Website
    url: https://watershed.com/
  - type: Platform
    url: https://watershed.com/platform
  - type: Dashboard
    url: https://dashboard.watershedclimate.com/
  - type: SampleCode
    url: https://github.com/watershed-climate/python-api-training
  - type: APITrackerProfile
    url: https://apitracker.io/a/watershedclimate
  - type: Marketplace
    url: https://watershed.com/marketplace
  - url: graphql/watershed-graphql.md
    type: GraphQL
  features:
  - name: Activity Data Ingestion
    description: Push activity data (utilities, travel, spend, cloud, supply chain)
      into Watershed via API.
  - name: Emissions Calculation
    description: Apply Watershed's library of 500,000+ emissions factors and pre-verified
      methodologies.
  - name: Footprint Retrieval
    description: Read computed Scope 1, 2, and 3 footprints at organizational and
      granular levels.
  - name: AI Agents
    description: Purpose-built agents for data cleaning, analysis, and report drafting.
  - name: Disclosure Reporting
    description: Accelerate ESG reporting across CSRD, SEC, CDP, TCFD, and SBTi frameworks.
  - name: Marketplace Access
    description: Surface carbon removal and clean energy procurement opportunities.
  - name: Dashboard API Key Management
    description: Provision and rotate API keys directly in the Watershed dashboard.
  useCases:
  - name: ERP and Spend Data Sync
    description: Automate transfer of financial and procurement data from ERP systems
      into Watershed.
  - name: Cloud Footprint Tracking
    description: Stream cloud usage and AI workload emissions into the platform.
  - name: Supply Chain Surveys
    description: Programmatically distribute and ingest supplier emissions data.
  - name: Regulatory Filing Prep
    description: Pull computed footprints into internal disclosure pipelines.
  - name: Internal Dashboards
    description: Power internal sustainability dashboards from authoritative Watershed
      data.
  integrations:
  - name: AWS
  - name: Snowflake
  - name: NetSuite
  - name: SAP
  - name: Workday
  - name: Salesforce
  - name: Coupa
  - name: Concur
  - name: Workiva
  - name: Google Workspace
  authentication:
  - type: APIKey
    description: API keys generated in the Watershed dashboard under Organization
      Settings.
