aid: watershed
name: Watershed
description: 'Watershed is an enterprise sustainability platform used by large companies
  to

  measure their carbon footprint, report against regulatory and voluntary

  frameworks, and act on decarbonization opportunities. The platform combines a

  library of 500,000+ emissions factors, pre-verified methodologies, and AI

  agents for data cleaning, analysis, and report drafting. Watershed exposes an

  API for automated data ingestion and reporting, alongside guided uploads, and

  publishes integrations for common enterprise data sources. API keys are

  provisioned to customers via the Watershed dashboard at

  dashboard.watershedclimate.com. Public developer documentation is limited;

  most API access is delivered through customer onboarding and partner

  enablement.

  '
type: Index
