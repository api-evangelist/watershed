# ─── Input Types ──────────────────────────────────────────────────────────────

input FootprintFilter {
  year: Int
  periodType: FootprintPeriodType
  startDate: Date
  endDate: Date
}

input ActivityFilter {
  activityTypes: [ActivityType!]
  scopes: [EmissionScope!]
  scope3Categories: [Scope3Category!]
  facilityIds: [ID!]
  startDate: Date
  endDate: Date
  status: ActivityStatus
  dataQuality: DataQualityScore
}

input EmissionFactorFilter {
  activityTypes: [ActivityType!]
  scopes: [EmissionScope!]
  sources: [EmissionFactorSource!]
  regions: [String!]
  countries: [String!]
  vintageYears: [Int!]
  searchQuery: String
}

input SupplierFilter {
  tier: Int
  industries: [String!]
  countries: [String!]
  hasSubmittedData: Boolean
  requestStatus: SupplierRequestStatus
}

input PaginationInput {
  first: Int
  after: String
  last: Int
  before: String
}

input SortInput {
  field: String!
  order: SortOrder!
}

input CreateActivityDataInput {
  facilityId: ID
  activityType: ActivityType!
  scope: EmissionScope!
  scope3Category: Scope3Category
  description: String
  quantity: Float!
  unit: Unit!
  startDate: Date!
  endDate: Date!
  vendorName: String
  costUSD: BigDecimal
  measurementApproach: MeasurementApproach!
  metadata: JSON
}

input UpdateActivityDataInput {
  facilityId: ID
  description: String
  quantity: Float
  unit: Unit
  startDate: Date
  endDate: Date
  vendorName: String
  costUSD: BigDecimal
  measurementApproach: MeasurementApproach
  metadata: JSON
}

input CreateSupplierInput {
  name: String!
  externalId: String
  tier: Int
  industry: String
  country: String
  annualSpendUSD: BigDecimal
  contactEmail: String
  contactName: String
  tags: [String!]
}

input CreateSupplierDataRequestInput {
  supplierId: ID!
  reportingYear: Int!
  dueDate: Date
  questionnaire: JSON
  notes: String
}

input CreateFacilityInput {
  name: String!
  address: AddressInput
  country: String!
  region: String
  facilityType: String
  squareFootage: Float
  occupancyPercent: Float
}

input AddressInput {
  street1: String
  street2: String
  city: String
  stateProvince: String
  postalCode: String
  country: String!
}

input CreateReportInput {
  name: String!
  framework: ReportingFramework!
  disclosureTarget: DisclosureTarget
