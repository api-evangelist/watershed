input CreateCarbonOffsetInput {
  projectName: String!
  projectType: String!
  standard: String
  quantity: Float!
  vintageYear: Int!
  country: String
  registryUrl: URI
  costPerTonne: Float
}

input BulkActivityUploadInput {
  fileName: String!
  fileContent: String!
  mimeType: String!
  startDate: Date!
  endDate: Date!
  facilityId: ID
}

input EmissionFactorLookupInput {
  activityType: ActivityType!
  quantity: Float!
  unit: Unit!
  country: String
  region: String
  year: Int
}

# ─── Query Root ───────────────────────────────────────────────────────────────

type Query {
  organization: Organization!

  # Activity data
  activityData(id: ID!): ActivityData
  activityDataList(
    filter: ActivityFilter
    pagination: PaginationInput
    sort: SortInput
  ): ActivityConnection!

  # Emission factors
  emissionFactor(id: ID!): EmissionFactor
  emissionFactors(
    filter: EmissionFactorFilter
    pagination: PaginationInput
  ): EmissionFactorConnection!
  emissionFactorSearch(query: String!, limit: Int): [EmissionFactorSearchResult!]!
  calculateEmissions(input: EmissionFactorLookupInput!): EmissionsResult!

  # Footprints
  footprint(id: ID!): EmissionsFootprint
  footprints(
    filter: FootprintFilter
    pagination: PaginationInput
  ): FootprintConnection!
  latestFootprint: EmissionsFootprint

  # Suppliers
  supplier(id: ID!): Supplier
  suppliers(
    filter: SupplierFilter
    pagination: PaginationInput
    sort: SortInput
  ): SupplierConnection!
  supplierDataRequest(id: ID!): SupplierDataRequest

  # Facilities
  facility(id: ID!): Facility
  facilities: [Facility!]!

  # Reports
  report(id: ID!): ClimateReport
  reports(
    framework: ReportingFramework
    status: ReportStatus
    pagination: PaginationInput
  ): [ClimateReport!]!

  # Decarbonization
  decarbonizationTarget(id: ID!): DecarbonizationTarget
  decarbonizationTargets: [DecarbonizationTarget!]!

  # Reference data
  electricityGridData(country: String!, region: String, year: Int): ElectricityGridData
  renewableEnergyCertificates: [RenewableEnergyCertificate!]!
  carbonOffsets: [CarbonOffset!]!

  # Integrations
  integrations: [Integration!]!
  integration(id: ID!): Integration

  # Admin
  apiKeys: [ApiKey!]!
  alerts(isRead: Boolean): [Alert!]!
  auditLogs(
    entityType: String
    entityId: ID
    pagination: PaginationInput
  ): AuditLogConnection!
  bulkUploadJob(id: ID!): BulkUploadJob
}

# ─── Mutation Root ────────────────────────────────────────────────────────────

type Mutation {
  # Activity data
  createActivityData(input: CreateActivityDataInput!): ActivityData!
  updateActivityData(id: ID!, input: UpdateActivityDataInput!): ActivityData!
  deleteActivityData(id: ID!): Boolean!
  bulkUploadActivityData(input: BulkActivityUploadInput!): BulkUploadJob!

  # Facilities
  createFacility(input: CreateFacilityInput!): Facility!
  updateFacility(id: ID!, input: CreateFacilityInput!): Facility!
  deleteFacility(id: ID!): Boolean!

  # Suppliers
  createSupplier(input: CreateSupplierInput!): Supplier!
  updateSupplier(id: ID!, input: CreateSupplierInput!): Supplier!
  deleteSupplier(id: ID!): Boolean!
  sendSupplierDataRequest(input: CreateSupplierDataRequestInput!): SupplierDataRequest!
  resendSupplierDataRequest(id: ID!): SupplierDataRequest!
  acceptSupplierDataResponse(requestId: ID!): SupplierDataRequest!

  # Reports
  createReport(input: CreateReportInput!): ClimateReport!
  updateReportSection(reportId: ID!, sectionId: ID!, content: String!): ReportSection!
  submitReport(id: ID!): ClimateReport!
  publishReport(id: ID!): ClimateReport!

  # Decarbonization
  createDecarbonizationTarget(input: CreateDecarbonizationTargetInput!): DecarbonizationTarget!
  updateDecarbonizationTarget(id: ID!, input: CreateDecarbonizationTargetInput!): DecarbonizationTarget!

  # Carbon offsets & RECs
  createCarbonOffset(input: CreateCarbonOffsetInput!): CarbonOffset!
  retireCarbonOffset(id: ID!): CarbonOffset!

  # API keys
  createApiKey(name: String!, scopes: [String!]!): ApiKeyWithSecret!
  revokeApiKey(id: ID!): Boolean!

  # Integrations
  triggerIntegrationSync(id: ID!): Integration!
  disableIntegration(id: ID!): Integration!

  # Alerts
  markAlertRead(id: ID!): Alert!
  markAllAlertsRead: Boolean!
}

type ApiKeyWithSecret {
  apiKey: ApiKey!
  secret: String!
}

# ─── Subscription Root ────────────────────────────────────────────────────────

type Subscription {
  footprintCalculated(organizationId: ID!): EmissionsFootprint!
  bulkUploadProgress(jobId: ID!): BulkUploadJob!
  supplierDataRequestUpdated(supplierId: ID): SupplierDataRequest!
  alertCreated(organizationId: ID!): Alert!
  integrationSyncCompleted(integrationId: ID!): Integration!
}
