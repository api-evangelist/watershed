"""
Watershed GraphQL API Schema
Enterprise climate platform for measuring, reducing, and reporting carbon emissions.
Covers footprint data ingestion, emission factor lookups, Scope 1/2/3 calculations,
supplier data requests, and climate reporting (GHG Protocol, CDP, TCFD).
"""

# ─── Scalars ──────────────────────────────────────────────────────────────────

scalar DateTime
scalar Date
scalar JSON
scalar Float
scalar BigDecimal
scalar URI

# ─── Enums ────────────────────────────────────────────────────────────────────

enum EmissionScope {
  SCOPE_1
  SCOPE_2_LOCATION_BASED
  SCOPE_2_MARKET_BASED
  SCOPE_3
}

