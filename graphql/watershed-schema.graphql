  DOWNSTREAM_TRANSPORTATION_AND_DISTRIBUTION
  PROCESSING_OF_SOLD_PRODUCTS
  USE_OF_SOLD_PRODUCTS
  END_OF_LIFE_TREATMENT_OF_SOLD_PRODUCTS
  DOWNSTREAM_LEASED_ASSETS
  FRANCHISES
  INVESTMENTS
